name: Test LLM with documents

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # позволяет запускать вручную из браузера

jobs:
  test:
    runs-on: self-hosted  # запускается на твоём домашнем ПК

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LLM tests
        run: python test_llm.py  # твой скрипт тестирования

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results/  # папка с результатами тестов
